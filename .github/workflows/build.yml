name: Build Yuntailscale

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.20.14'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y upx-ucl

      - name: Build and Compress
        run: |
          export GOOS=windows
          export GOARCH=amd64
          go build -ldflags="-s -w" -o yuntailscaled.exe ./cmd/tailscaled
          go build -ldflags="-s -w" -o yuntailscale.exe ./cmd/tailscale
          upx --best --lzma yuntailscaled.exe
          upx --best --lzma yuntailscale.exe

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Yuntailscale-Windows-amd64
          path: |
            yuntailscaled.exe
            yuntailscale.exe
