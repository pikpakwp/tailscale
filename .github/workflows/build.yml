name: Build Yuntailscale

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.20.14'
      - name: Build
        run: |
          sudo apt-get update && sudo apt-get install -y upx
          # 关键：保留这个禁用 CGO，让 Win7 运行更稳
          export CGO_ENABLED=0
          GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o yuntailscaled.exe ./cmd/tailscaled
          GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o yuntailscale.exe ./cmd/tailscale
          # 恢复 UPX 压缩，减小体积
          upx --best --lzma yuntailscaled.exe
          upx --best --lzma yuntailscale.exe
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Yuntailscale-Windows-amd64
          path: |
            yuntailscale.exe
            yuntailscaled.exe
